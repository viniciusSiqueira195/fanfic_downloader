name: Release

# Dispara ao lançar uma tag de versão semver, com ou sem o prefixo "v"
# (ex.: 1.1.0 ou v1.1.0). Builda o app com PyInstaller (onedir), empacota
# no zip com tudo na raiz (FanficDownloader.exe + _internal/ +
# NOVIDADES.txt, que é o layout que o auto-updater do app espera) e
# publica a release.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Conferir se a tag bate com src/version.py
        # O updater compara a tag da release com APP_VERSION. Se divergirem,
        # o app publicado acharia que está desatualizado para sempre (loop de
        # atualização) — melhor falhar o build aqui.
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $appVersion = python -c "import sys; sys.path.insert(0, 'src'); from version import APP_VERSION; print(APP_VERSION)"
          if ($tag -ne $appVersion) {
            Write-Error "A tag ($tag) nao bate com APP_VERSION em src/version.py ($appVersion). Atualize src/version.py antes de lancar a tag."
            exit 1
          }
          echo "VERSION=$tag" >> $env:GITHUB_ENV

      - name: Compilar o executável (PyInstaller)
        run: python -m PyInstaller --clean --noconfirm FanficDownloader.spec

      - name: Montar o zip da release
        # O updater.py extrai esse zip por cima da pasta do app, preservando
        # o config.json do usuário — por isso o config.json NÃO entra no zip.
        run: |
          New-Item -ItemType Directory release_stage | Out-Null
          Copy-Item dist/FanficDownloader/* release_stage/ -Recurse
          Copy-Item novidades.txt release_stage/NOVIDADES.txt
          Copy-Item LICENSE release_stage/LICENSE.txt
          $zip = "FanficDownloader_v$env:VERSION.zip"
          Compress-Archive -Path release_stage/* -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          "$hash  $zip" | Out-File -Encoding ascii "$zip.sha256"
          Get-ChildItem $zip, "$zip.sha256" | Format-List Name, Length

      - name: Gerar as notas da release a partir do novidades.txt
        # Usa o primeiro bloco do changelog (até a linha separadora de "=").
        run: |
          $texto = Get-Content novidades.txt -Raw -Encoding utf8
          $bloco = ($texto -split "={10,}")[0].Trim()
          $bloco | Out-File -Encoding utf8 release_notes.md

      - name: Publicar a release
        uses: softprops/action-gh-release@v2
        with:
          name: Fanfic Downloader v${{ env.VERSION }}
          body_path: release_notes.md
          files: |
            FanficDownloader_v*.zip
            FanficDownloader_v*.zip.sha256
